target: "192.168.1.10"          # IP or hostname — must be a system you own/control
domain: ""                      # optional, for subfinder/web recon (leave blank if N/A)
ports: "1-1000"                 # nmap port range
output_dir: "output"
anthropic_model: "claude-haiku-4-5-20251001"  # fast/cheap; use "claude-sonnet-4-6" for more nuanced analysis

tools:
  nmap: "nmap"
  subfinder: "subfinder"
  whatweb: "whatweb"
  nikto: "nikto"
  gobuster: "gobuster"
  wordlist: "/usr/share/wordlists/dirb/common.txt"
